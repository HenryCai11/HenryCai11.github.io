<script>
/* ---- 藤蔓 vine curves for paper trees ---- */
(function () {
  var NS = 'http://www.w3.org/2000/svg';

  /* Relative position of `el` within `container` (both using viewport coords) */
  function r(el, container) {
    var eb = el.getBoundingClientRect();
    var cb = container.getBoundingClientRect();
    return { x: eb.left - cb.left, y: eb.top  - cb.top,
             w: eb.width,          h: eb.height,
             x2: eb.right - cb.left, y2: eb.bottom - cb.top };
  }

  /* Cubic bezier: drop down from (x1,y1), then sweep right to (x2,y2) */
  function path(x1, y1, x2, y2) {
    var my = y1 + (y2 - y1) * 0.5;
    return 'M' + f(x1) + ',' + f(y1) +
           ' C' + f(x1) + ',' + f(my) +
           ' '  + f(x2) + ',' + f(my) +
           ' '  + f(x2) + ',' + f(y2);
  }

  function f(n) { return n.toFixed(1); }

  function dot(svg, x, y, r, main) {
    var c = document.createElementNS(NS, 'circle');
    c.setAttribute('cx', f(x)); c.setAttribute('cy', f(y)); c.setAttribute('r', r);
    c.style.setProperty('fill', main ? 'var(--accent)' : 'var(--border)');
    svg.appendChild(c);
  }

  function line(svg, d, main) {
    var p = document.createElementNS(NS, 'path');
    p.setAttribute('d', d); p.setAttribute('fill', 'none');
    p.setAttribute('stroke-linecap', 'round'); p.setAttribute('stroke-linejoin', 'round');
    p.style.setProperty('stroke',       main ? 'var(--accent)' : 'var(--border)');
    p.style.setProperty('stroke-width', main ? '2'             : '1.5');
    svg.appendChild(p);
    return p;
  }

  function drawTree(tree) {
    var old = tree.querySelector('.ptree-svg');
    if (old) old.remove();

    /* Build SVG and append immediately so getTotalLength() works */
    var svg = document.createElementNS(NS, 'svg');
    svg.classList.add('ptree-svg');
    svg.setAttribute('aria-hidden', 'true');
    tree.appendChild(svg);

    var paths = [];
    var root  = tree.querySelector('.ptree-root');
    var rr    = r(root, tree);

    /* Trunk anchor: bottom-left of root pill */
    var tx = rr.x + 18, ty = rr.y2;
    dot(svg, tx, ty, 3, true);

    tree.querySelectorAll('.ptree-branch').forEach(function (branch) {
      var cat  = branch.querySelector('.ptree-cat-label');
      var cr   = r(cat, tree);

      /* root → left-middle of category */
      var cx = cr.x, cy = cr.y + cr.h * 0.5;
      paths.push(line(svg, path(tx, ty, cx, cy), true));
      dot(svg, cx, cy, 3, true);

      /* category bottom → left-upper of each leaf */
      var bx = cr.x + cr.w * 0.25, by = cr.y2;

      branch.querySelectorAll('.ptree-leaf').forEach(function (leaf) {
        var lr = r(leaf, tree);
        var lx = lr.x, ly = lr.y + lr.h * 0.35;
        paths.push(line(svg, path(bx, by, lx, ly), false));
        dot(svg, lx, ly, 2.5, false);
      });
    });

    /* Animate: paths draw themselves in sequence */
    paths.forEach(function (p, i) {
      var len = p.getTotalLength() || 80;
      p.style.strokeDasharray  = len;
      p.style.strokeDashoffset = len;
    });
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        paths.forEach(function (p, i) {
          p.style.transition = 'stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1) ' + (i * 0.15) + 's';
          p.style.strokeDashoffset = '0';
        });
      });
    });
  }

  function drawAll() {
    document.querySelectorAll('.ptree').forEach(drawTree);
  }

  window.addEventListener('load', drawAll);

  window.addEventListener('resize', function () {
    clearTimeout(window._vineT);
    window._vineT = setTimeout(drawAll, 200);
  });

  window._drawVines = drawAll;
})();
</script>
