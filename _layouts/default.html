<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title and page.title != "About" %}{{ page.title }} — {% endif %}{{ site.name }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;1,14..32,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
  <link rel="icon" href="/images/favicon.ico">
  {% feed_meta %}
  <!-- Continuous day→night interpolation (runs before render — no flash) -->
  <script>
  window.MC = (function () {
    /* Control points: minutes-since-midnight → full palette */
    var CP = [
      /* Dawn 04:00 — rich warm amber */
      { t: 240,  v: { '--bg':'#FDECD0','--bg-top':'#FFF6EC','--surface':'#FFF9F3','--text':'#2C1800','--text-muted':'#7C5018','--text-subtle':'#B88840','--accent':'#D88020','--accent-dark':'#B06010','--accent-bg':'#FDE4A8','--border':'#E8C880','--border-light':'#F2DAAA','--pre-bg':'#2C1800','--pre-color':'#F2DAAA' }},
      /* Morning 07:00 — warm cream, deep coral */
      { t: 420,  v: { '--bg':'#F5EFE6','--bg-top':'#FDFAF6','--surface':'#FFFFFF','--text':'#1A1410','--text-muted':'#685848','--text-subtle':'#A89080','--accent':'#D05028','--accent-dark':'#A83C1E','--accent-bg':'#FDEAE0','--border':'#DDD0C4','--border-light':'#EAE1D8','--pre-bg':'#1A1410','--pre-color':'#EAE1D8' }},
      /* Afternoon 11:00 — golden honey */
      { t: 660,  v: { '--bg':'#F8F0C8','--bg-top':'#FBF6DE','--surface':'#FFFDF0','--text':'#1E1600','--text-muted':'#5E4C00','--text-subtle':'#A08820','--accent':'#C89800','--accent-dark':'#9E7800','--accent-bg':'#FEF0A0','--border':'#DECA60','--border-light':'#EAD878','--pre-bg':'#1E1600','--pre-color':'#EAD878' }},
      /* Sunset 16:00 — vivid coral-orange */
      { t: 960,  v: { '--bg':'#F5DCC8','--bg-top':'#FBECE0','--surface':'#FFF5EE','--text':'#300800','--text-muted':'#842C10','--text-subtle':'#C07050','--accent':'#D84020','--accent-dark':'#AC2E16','--accent-bg':'#FDD8C8','--border':'#E8A888','--border-light':'#F0C0A8','--pre-bg':'#300800','--pre-color':'#F0C0A8' }},
      /* Dusk 18:59 — last light-mode point; 1-min gap prevents gray crossover */
      { t: 1139, v: { '--bg':'#ECD8F8','--bg-top':'#F4E8FF','--surface':'#FAF2FF','--text':'#1A0838','--text-muted':'#5A2880','--text-subtle':'#9860C0','--accent':'#7840D8','--accent-dark':'#5820B8','--accent-bg':'#DCC8F8','--border':'#C0A0E0','--border-light':'#D4B8EC','--pre-bg':'#1A0838','--pre-color':'#D4B8EC' }},
      /* Twilight 19:00 — first dark-mode point, deep indigo */
      { t: 1140, v: { '--bg':'#110A24','--bg-top':'#1A1234','--surface':'#180E30','--text':'#EDE6FF','--text-muted':'#BEA8E8','--text-subtle':'#7C60A8','--accent':'#A070F8','--accent-dark':'#7850D8','--accent-bg':'#221040','--border':'#321858','--border-light':'#281244','--pre-bg':'#0C0618','--pre-color':'#BEA8E8' }},
      /* Night 21:00 — rich dark indigo */
      { t: 1260, v: { '--bg':'#0E0C18','--bg-top':'#181428','--surface':'#1C1828','--text':'#F0ECF8','--text-muted':'#C8C0E0','--text-subtle':'#706088','--accent':'#B898FF','--accent-dark':'#9070F0','--accent-bg':'#281C48','--border':'#302840','--border-light':'#281E38','--pre-bg':'#0A0812','--pre-color':'#C8C0E0' }},
      /* Midnight 00:00 — stay deep dark, don't brighten yet */
      { t: 1440, v: { '--bg':'#090712','--bg-top':'#110D1E','--surface':'#141020','--text':'#F0ECF8','--text-muted':'#C8C0E0','--text-subtle':'#706088','--accent':'#A080F0','--accent-dark':'#7858D0','--accent-bg':'#1C1438','--border':'#241A30','--border-light':'#1C1428','--pre-bg':'#060410','--pre-color':'#C8C0E0' }},
      /* wrap: same as Dawn at 4am next cycle */
      { t: 1680, v: { '--bg':'#FDECD0','--bg-top':'#FFF6EC','--surface':'#FFF9F3','--text':'#2C1800','--text-muted':'#7C5018','--text-subtle':'#B88840','--accent':'#D88020','--accent-dark':'#B06010','--accent-bg':'#FDE4A8','--border':'#E8C880','--border-light':'#F2DAAA','--pre-bg':'#2C1800','--pre-color':'#F2DAAA' }},
    ];

    function rgb(h) {
      return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
    }
    function lerp(a, b, t) {
      var ra=rgb(a), rb=rgb(b);
      return '#'+ra.map(function(v,i){
        return ('0'+Math.round(v+(rb[i]-v)*t).toString(16)).slice(-2);
      }).join('');
    }

    function apply(root) {
      var now = new Date();
      var m = now.getHours()*60 + now.getMinutes();
      if (m < 240) m += 1440; /* before 4 am → treat as tail of previous cycle */

      var i = 0;
      while (i < CP.length-2 && CP[i+1].t <= m) i++;
      var c1=CP[i], c2=CP[i+1];
      var f = Math.max(0, Math.min(1, (m-c1.t)/(c2.t-c1.t)));

      var keys = Object.keys(c1.v);
      for (var k=0; k<keys.length; k++) {
        root.style.setProperty(keys[k], lerp(c1.v[keys[k]], c2.v[keys[k]], f));
      }
      var bgRgb = rgb(lerp(c1.v['--bg'], c2.v['--bg'], f));
      root.style.setProperty('--bg-rgb', bgRgb.join(','));
    }

    return { apply: apply };
  })();

  window.MC.apply(document.documentElement);
  </script>
</head>
<body>

<header class="site-header" id="siteHeader">
  <div class="header-inner">
    <a href="/" class="site-brand">Min Cai</a>
    <nav class="site-nav" id="siteNav">
      <a href="/" class="nav-link{% if page.url == '/' or page.url == '/about/' or page.url == '/about.html' %} active{% endif %}">About</a>
      <a href="/blog/" class="nav-link{% if page.url contains '/blog' or page.url contains '/posts' %} active{% endif %}">Blog</a>
      <a href="/files/CV_Min.pdf" class="nav-link" target="_blank" rel="noopener">CV&nbsp;↗</a>
    </nav>
    <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu" aria-expanded="false">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>
  </div>
</header>

<main class="site-main">
  {{ content }}
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <span>© {{ site.time | date: '%Y' }} Min Cai</span>
    <span class="footer-sep">·</span>
    <a href="https://github.com/HenryCai11" target="_blank" rel="noopener">GitHub</a>
    <span class="footer-sep">·</span>
    <a href="https://scholar.google.com/citations?user=QMTSC0oAAAAJ&hl=en" target="_blank" rel="noopener">Google Scholar</a>
    <span class="footer-sep">·</span>
    <a href="https://orcid.org/0000-0002-3694-7875" target="_blank" rel="noopener">ORCID</a>
    <span class="footer-sep">·</span>
    <img src="https://visitor-badge.laobi.icu/badge?page_id=HenryCai11.github.io&left_color=%23595959&right_color=%23888888&left_text=visitors"
         alt="visit counter" class="visit-badge">
  </div>
</footer>

<!-- Theme indicator pill -->
<div class="theme-indicator" id="themeIndicator">
  <span class="theme-dot"></span>
  <span id="themeName"></span>
</div>

<script>
  /* ---- Mobile nav ---- */
  (function () {
    var toggle = document.getElementById('menuToggle');
    var nav = document.getElementById('siteNav');
    toggle.addEventListener('click', function () {
      var expanded = toggle.getAttribute('aria-expanded') === 'true';
      toggle.setAttribute('aria-expanded', String(!expanded));
      nav.classList.toggle('open');
      toggle.classList.toggle('open');
    });
    document.addEventListener('click', function (e) {
      if (!toggle.contains(e.target) && !nav.contains(e.target)) {
        nav.classList.remove('open');
        toggle.classList.remove('open');
        toggle.setAttribute('aria-expanded', 'false');
      }
    });
  })();

  /* ---- Poll every 30 s to keep interpolated colors in sync ---- */
  (function () {
    var labels = ['Dawn','Morning','Afternoon','Sunset','','Twilight','Night','Midnight'];
    var indicator = document.getElementById('themeIndicator');
    var nameEl    = document.getElementById('themeName');
    var hideTimer, lastBracket = -1;

    function bracket() {
      var h = new Date().getHours();
      return h>=4&&h<7?0:h>=7&&h<11?1:h>=11&&h<16?2:h>=16&&h<19?3:h>=19&&h<21?5:h>=21?6:7;
    }

    function tick() {
      window.MC.apply(document.documentElement);
      var b = bracket();
      if (lastBracket !== -1 && b !== lastBracket) {
        nameEl.textContent = labels[b];
        clearTimeout(hideTimer);
        indicator.classList.add('visible');
        hideTimer = setTimeout(function(){ indicator.classList.remove('visible'); }, 3500);
      }
      lastBracket = b;
    }

    setInterval(tick, 30000);
    document.addEventListener('visibilitychange', function(){ if (!document.hidden) tick(); });
  })();

</script>

</body>
</html>
