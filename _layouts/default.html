<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title and page.title != "About" %}{{ page.title }} — {% endif %}{{ site.name }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;1,14..32,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
  <link rel="icon" href="/images/favicon.ico">
  {% feed_meta %}
  <!-- Continuous day→night interpolation (runs before render — no flash) -->
  <script>
  window.MC = (function () {
    /* Control points: minutes-since-midnight → full palette */
    var CP = [
      { t: 240,  v: { '--bg':'#FDF5EC','--bg-top':'#FFF8F2','--surface':'#FFFCF8','--text':'#2A1C0C','--text-muted':'#7A5A30','--text-subtle':'#C0A070','--accent':'#CF7820','--accent-dark':'#A85E10','--accent-bg':'#FEF3DC','--border':'#EAD8BC','--border-light':'#F2E6CC','--pre-bg':'#2A1C0C','--pre-color':'#F2E6CC' }},
      { t: 420,  v: { '--bg':'#F8F5F0','--bg-top':'#FFFFFF','--surface':'#FFFFFF','--text':'#1A1614','--text-muted':'#6B6058','--text-subtle':'#A8A098','--accent':'#C84B24','--accent-dark':'#A33B1A','--accent-bg':'#FEF0EA','--border':'#E3DDD6','--border-light':'#EDE9E3','--pre-bg':'#1A1614','--pre-color':'#F5F0EB' }},
      { t: 660,  v: { '--bg':'#FBF6E8','--bg-top':'#FFFDF5','--surface':'#FFFDF5','--text':'#1E1800','--text-muted':'#5C4E10','--text-subtle':'#A89040','--accent':'#C89000','--accent-dark':'#A07200','--accent-bg':'#FEF4CC','--border':'#E8D890','--border-light':'#F2E8B0','--pre-bg':'#1E1800','--pre-color':'#F2E8B0' }},
      { t: 960,  v: { '--bg':'#F8EEE6','--bg-top':'#FFF0E4','--surface':'#FFF8F4','--text':'#280A00','--text-muted':'#7A3018','--text-subtle':'#C08060','--accent':'#C83018','--accent-dark':'#A02010','--accent-bg':'#FEEAE0','--border':'#EAC4B0','--border-light':'#F2D8C8','--pre-bg':'#280A00','--pre-color':'#F2D8C8' }},
      { t: 1140, v: { '--bg':'#EEEAF8','--bg-top':'#E8E2F8','--surface':'#F8F6FF','--text':'#140A30','--text-muted':'#4A3880','--text-subtle':'#9080C0','--accent':'#5840D0','--accent-dark':'#3E2CA8','--accent-bg':'#EAE4FC','--border':'#C8BAE8','--border-light':'#D8CEF2','--pre-bg':'#140A30','--pre-color':'#D8CEF2' }},
      { t: 1260, v: { '--bg':'#121016','--bg-top':'#1A1628','--surface':'#1C1A22','--text':'#EDE8F4','--text-muted':'#C0B8D4','--text-subtle':'#6A6080','--accent':'#A888F0','--accent-dark':'#8860D8','--accent-bg':'#241C38','--border':'#2C2838','--border-light':'#241E30','--pre-bg':'#0C0A10','--pre-color':'#C0B8D4' }},
      /* wrap: same as Dawn, placed at 4am next cycle */
      { t: 1680, v: { '--bg':'#FDF5EC','--bg-top':'#FFF8F2','--surface':'#FFFCF8','--text':'#2A1C0C','--text-muted':'#7A5A30','--text-subtle':'#C0A070','--accent':'#CF7820','--accent-dark':'#A85E10','--accent-bg':'#FEF3DC','--border':'#EAD8BC','--border-light':'#F2E6CC','--pre-bg':'#2A1C0C','--pre-color':'#F2E6CC' }},
    ];

    function rgb(h) {
      return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
    }
    function lerp(a, b, t) {
      var ra=rgb(a), rb=rgb(b);
      return '#'+ra.map(function(v,i){
        return ('0'+Math.round(v+(rb[i]-v)*t).toString(16)).slice(-2);
      }).join('');
    }

    function apply(root) {
      var now = new Date();
      var m = now.getHours()*60 + now.getMinutes();
      if (m < 240) m += 1440; /* before 4 am → treat as tail of previous cycle */

      var i = 0;
      while (i < CP.length-2 && CP[i+1].t <= m) i++;
      var c1=CP[i], c2=CP[i+1];
      var f = Math.max(0, Math.min(1, (m-c1.t)/(c2.t-c1.t)));

      var keys = Object.keys(c1.v);
      for (var k=0; k<keys.length; k++) {
        root.style.setProperty(keys[k], lerp(c1.v[keys[k]], c2.v[keys[k]], f));
      }
      var bgRgb = rgb(lerp(c1.v['--bg'], c2.v['--bg'], f));
      root.style.setProperty('--bg-rgb', bgRgb.join(','));
    }

    return { apply: apply };
  })();

  window.MC.apply(document.documentElement);
  </script>
</head>
<body>

<header class="site-header" id="siteHeader">
  <div class="header-inner">
    <a href="/" class="site-brand">Min Cai</a>
    <nav class="site-nav" id="siteNav">
      <a href="/" class="nav-link{% if page.url == '/' or page.url == '/about/' or page.url == '/about.html' %} active{% endif %}">About</a>
      <a href="/blog/" class="nav-link{% if page.url contains '/blog' or page.url contains '/posts' %} active{% endif %}">Blog</a>
      <a href="/files/CV_Min.pdf" class="nav-link" target="_blank" rel="noopener">CV&nbsp;↗</a>
    </nav>
    <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu" aria-expanded="false">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>
  </div>
</header>

<main class="site-main">
  {{ content }}
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <span>© {{ site.time | date: '%Y' }} Min Cai</span>
    <span class="footer-sep">·</span>
    <a href="https://github.com/HenryCai11" target="_blank" rel="noopener">GitHub</a>
    <span class="footer-sep">·</span>
    <a href="https://scholar.google.com/citations?user=QMTSC0oAAAAJ&hl=en" target="_blank" rel="noopener">Google Scholar</a>
    <span class="footer-sep">·</span>
    <a href="https://orcid.org/0000-0002-3694-7875" target="_blank" rel="noopener">ORCID</a>
  </div>
</footer>

<!-- Theme indicator pill -->
<div class="theme-indicator" id="themeIndicator">
  <span class="theme-dot"></span>
  <span id="themeName"></span>
</div>

<script>
  /* ---- Mobile nav ---- */
  (function () {
    var toggle = document.getElementById('menuToggle');
    var nav = document.getElementById('siteNav');
    toggle.addEventListener('click', function () {
      var expanded = toggle.getAttribute('aria-expanded') === 'true';
      toggle.setAttribute('aria-expanded', String(!expanded));
      nav.classList.toggle('open');
      toggle.classList.toggle('open');
    });
    document.addEventListener('click', function (e) {
      if (!toggle.contains(e.target) && !nav.contains(e.target)) {
        nav.classList.remove('open');
        toggle.classList.remove('open');
        toggle.setAttribute('aria-expanded', 'false');
      }
    });
  })();

  /* ---- Poll every 30 s to keep interpolated colors in sync ---- */
  (function () {
    var labels = ['Dawn','Morning','Afternoon','Sunset','Twilight','Night'];
    var indicator = document.getElementById('themeIndicator');
    var nameEl    = document.getElementById('themeName');
    var hideTimer, lastBracket = -1;

    function bracket() {
      var h = new Date().getHours();
      return h>=4&&h<7?0:h>=7&&h<11?1:h>=11&&h<16?2:h>=16&&h<19?3:h>=19&&h<21?4:5;
    }

    function tick() {
      window.MC.apply(document.documentElement);
      var b = bracket();
      if (lastBracket !== -1 && b !== lastBracket) {
        nameEl.textContent = labels[b];
        clearTimeout(hideTimer);
        indicator.classList.add('visible');
        hideTimer = setTimeout(function(){ indicator.classList.remove('visible'); }, 3500);
      }
      lastBracket = b;
    }

    setInterval(tick, 30000);
    document.addEventListener('visibilitychange', function(){ if (!document.hidden) tick(); });
  })();
</script>

</body>
</html>
